[package]
name = "api"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["fullstack"] }
eserde = { package = "serde", version = "1.0.219", features = ["derive"] }
anyhow = { version = "1.0.98", optional = true }
argon2 = { version = "0.5.3", optional = true }
async-trait = { version = "0.1.88", optional = true }
axum_session = { version = "0.16.0", optional = true }
axum_session_auth = { version = "0.16.0", optional = true }
axum_session_sqlx = { version = "0.5.0", default-features = false, features = ["sqlite", "tls-rustls"], optional = true }
dotenvy = { version = "0.15.7", optional = true }
dotenvy_macro = { version = "0.15.7", optional = true }
sqlx = { version = "0.8.3", default-features = false, features = ["sqlite", "runtime-tokio-rustls", "migrate", "macros"], optional = true }
uuid = { version = "1.18.0", features = ["v4"], optional = true }

[features]
server = [
    "dioxus/server",
    "dep:anyhow",
    "dep:argon2",
    "dep:async-trait",
    "dep:axum_session",
    "dep:axum_session_auth",
    "dep:axum_session_sqlx",
    "dep:dotenvy",
    "dep:dotenvy_macro",
    "dep:sqlx",
    "dep:uuid",
]
